name: Build and Deploy Blazor WASM (.NET 10)

on:
  push:
    branches: [ "main" ]

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    if: startsWith(github.event.head_commit.message, '[publish]')

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish project
        working-directory: src/IS.App
        run: dotnet publish -c Release /p:Version=1.0.${{ github.run_number }}

      - name: Prepare output
        run: |
          cp src/IS.App/bin/Release/net10.0/publish/wwwroot/index.html src/IS.App/bin/Release/net10.0/publish/wwwroot/404.html
          touch src/IS.App/bin/Release/net10.0/publish/wwwroot/.nojekyll

      - name: Deploy to GitHub Pages repo
        uses: peaceiris/actions-gh-pages@v3
        with:
          personal_token: ${{ secrets.PAGES_DEPLOY_TOKEN }}
          external_repository: aldinei-sampaio/aldinei-sampaio.github.io
          publish_branch: main
          publish_dir: src/IS.App/bin/Release/net10.0/publish/wwwroot
          force_orphan: true
