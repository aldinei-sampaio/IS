<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Contos Interativos</title>
    <base href="/" />
    <link rel="stylesheet" href="css/app.css" />
    <link rel="stylesheet" href="IS.App.styles.css" />
</head>
<body>
    <div id="app">
        <div class="app-loading">
            <img src="assets/logo.png" alt="Contos Interativos" class="app-loading-logo" />
            <svg xmlns="http://www.w3.org/2000/svg" class="loading-progress">
                <circle r="40%" cx="50%" cy="50%" />
                <circle r="40%" cx="50%" cy="50%" />
            </svg>
            <div class="loading-progress-text"></div>
        </div>
    </div>
    <div id="blazor-error-ui">
        Ocorreu um erro inesperado.
        <a href="" class="reload">Recarregar</a>
        <span class="dismiss">&#10005;</span>
    </div>
    <div id="rotate-warning">
        <span>Por favor, gire seu dispositivo para o modo retrato</span>
    </div>
    <script>
        // Tenta bloquear a orientação em modo retrato (funciona em PWA e fullscreen no Android)
        if (screen.orientation && typeof screen.orientation.lock === 'function') {
            screen.orientation.lock('portrait').catch(() => {});
        }
    </script>
    <script src="_framework/blazor.webassembly.js"></script>
</body>
</html>
